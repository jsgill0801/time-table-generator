<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable | Timetable Generator</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body class="app-page" data-page="timetable">
    <div class="app-shell">
        <aside class="app-sidebar" data-sidebar></aside>

        <main class="app-main">
            <header class="page-header">
                <div>
                    <h1>Timetable</h1>
                </div>
            </header>

            <section class="content-panel">
                <div class="panel-heading">
                    <div>
                        <h2>Download View</h2>
                        
                    </div>
                </div>

                <div class="tab-strip" role="tablist" aria-label="Timetable views">
                    <button class="tab-button is-active" type="button" data-view-tab="overall">Overall</button>
                    <button class="tab-button" type="button" data-view-tab="faculty">Faculty-wise</button>
                    <button class="tab-button" type="button" data-view-tab="rooms">Room-wise</button>
                    <button class="tab-button" type="button" data-view-tab="batches">Batch-wise</button>
                </div>

                <div class="download-panel">
                    <article class="run-card">
                        <p class="page-kicker">Selected Type</p>
                        <h3 id="selectedTimetableTitle">Overall</h3>
                        <p id="selectedTimetableDescription">Combined file for all batches.</p>
                    </article>

                    <aside class="note-card">
                        <h3>Export</h3>
                        <p class="download-helper" id="downloadHelperText">Run Dashboard first to enable downloads.</p>
                        <div class="run-actions">
                            <button class="btn-primary btn-large" id="downloadTimetableButton" type="button">Download</button>
                        </div>
                    </aside>
                </div>

                <div class="empty-state" id="timetableEmptyState">
                    <p>No run yet. Generate from Dashboard first.</p>
                </div>
            </section>

        </main>
    </div>

    <script src="../static/script.js" defer></script>
</body>
</html>
