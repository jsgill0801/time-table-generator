<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run Timetable | Timetable Generator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="app-page" data-page="dashboard">
    <div class="app-shell">
        <aside class="app-sidebar" data-sidebar></aside>

        <main class="app-main">
            <header class="page-header dashboard-header">
                <div>
                    <h1>Dashboard</h1>
                </div>
                <button class="btn-primary btn-large" id="runTimetableButton" type="button">Run</button>
            </header>

            <section class="stats-grid stats-grid-dashboard dashboard-stats-grid" aria-label="Dashboard summary">
                <article class="stat-card stat-card-muted">
                    <div>
                        <span class="stat-label">Courses Offered</span>
                        <strong class="stat-value" id="courseCount">0</strong>
                    </div>
                    
                </article>

                <article class="stat-card stat-card-muted">
                    <div>
                        <span class="stat-label">Faculty Available</span>
                        <strong class="stat-value" id="facultyCount">0</strong>
                    </div>
                    
                </article>

                <article class="stat-card stat-card-muted">
                    <div>
                        <span class="stat-label">Rooms Available</span>
                        <strong class="stat-value" id="roomCount">0</strong>
                    </div>
                    
                </article>

                <article class="stat-card stat-card-muted">
                    <div>
                        <span class="stat-label">Batches</span>
                        <strong class="stat-value" id="batchCount">0</strong>
                    </div>
                    
                </article>

                <article class="stat-card stat-card-muted">
                    <div>
                        <span class="stat-label">Categories</span>
                        <strong class="stat-value" id="categoryCount">0</strong>
                    </div>
                    
                </article>

                <article class="stat-card stat-card-muted">
                    <div>
                        <span class="stat-label">Slots</span>
                        <strong class="stat-value" id="slotCount">0</strong>
                    </div>
                    
                </article>
            </section>


            <section class="content-panel report-panel is-hidden dashboard-panel" id="dashboardReport">
                <div class="panel-heading">
                    <div>
                        <h2>Run Summary</h2>
                    </div>
                </div>

                <div class="report-grid report-grid-dashboard">
                    <article class="report-card">
                        <h3>Courses Scheduled</h3>
                        <strong class="report-value" id="courseUsageCount">0 / 0</strong>
                    </article>

                    <article class="report-card">
                        <h3>Course Clashes</h3>
                        <strong class="report-value" id="courseClashCount">0</strong>
                    </article>

                    <article class="report-card">
                        <h3>Faculty Clashes</h3>
                        <strong class="report-value" id="facultyClashCount">0</strong>
                    </article>

                    <article class="report-card">
                        <h3>Room Conflicts</h3>
                        <strong class="report-value" id="roomConflictCount">0</strong>
                    </article>

                    <article class="report-card">
                        <h3>Slot Conflicts</h3>
                        <strong class="report-value" id="slotConflictCount">0</strong>
                    </article>
                </div>

                <!--<article class="conflict-report-card">
                    <div class="panel-heading panel-heading-compact">
                        <div>
                            <h3>Conflict Report</h3>
                            <p class="panel-subtext" id="conflictReportSummary">Run the timetable to see unresolved course, room, or slot issues.</p>
                        </div>
                    </div>

                    <div class="conflict-list" id="conflictReportList">
                        <p class="muted-copy">No run yet.</p>
                    </div>
                </article>-->

                <div class="success-banner">
                    <div>
                        <h3>Latest run</h3>
                        <p id="lastRunText">Run the timetable to create the latest file set.</p>
                    </div>
                    <a class="inline-link" href="timetable.html">Open Timetable</a>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/api.js" defer></script><script src="/static/script.js" defer></script>
</body>
</html>
