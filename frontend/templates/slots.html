<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slots | Timetable Generator</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body class="app-page" data-page="slots" data-resource-page="slots">
    <div class="app-shell">
        <aside class="app-sidebar" data-sidebar></aside>

        <main class="app-main">
            <header class="page-header">
                <div>
                    <p class="page-kicker">Setup</p>
                    <h1 data-resource-title></h1>
                    <p class="page-intro" data-resource-description></p>
                </div>
                <div class="page-chip" data-resource-chip></div>
            </header>

            <section class="stats-grid stats-grid-compact" data-resource-metrics></section>

            <section class="panel-grid">
                <article class="content-panel">
                    <div class="panel-heading">
                        <div>
                            <h2 data-table-title></h2>
                            <p class="panel-subtext">Search and review records.</p>
                        </div>

                        <label class="search-field">
                            <span>Search</span>
                            <input type="search" data-resource-search>
                        </label>
                    </div>

                    <div class="table-wrap">
                        <table class="data-table">
                            <thead data-resource-head></thead>
                            <tbody data-resource-body></tbody>
                        </table>
                    </div>

                    <div class="empty-state is-hidden" id="resourceEmptyState">
                        <p>No matching records.</p>
                    </div>
                </article>
            </section>
        </main>
    </div>

    <script src="../static/script.js" defer></script>
</body>
</html>
